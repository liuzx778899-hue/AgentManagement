<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <style>
      .bg{fill:#101215}.side{fill:#15181d}.panel{fill:#171a1f;stroke:#343b46;stroke-width:1}.panel2{fill:#20242b;stroke:#343b46;stroke-width:1}.soft{fill:#282e37}.text{fill:#f4f7fb;font-family:Inter,Segoe UI,Arial,sans-serif}.muted{fill:#a8b0bd;font-family:Inter,Segoe UI,Arial,sans-serif}.faint{fill:#747f8e;font-family:Inter,Segoe UI,Arial,sans-serif}.mono{fill:#c3d3e9;font-family:Consolas,monospace}.blue{fill:#4f8cff}.green{fill:#51d6a1}.amber{fill:#f2b85b}.violet{fill:#b697ff}.danger{fill:#f97066}.line{stroke:#343b46;stroke-width:1}.thin{stroke:#262c35;stroke-width:1}.label{font-size:12px;font-weight:700}.h1{font-size:20px;font-weight:800}.h2{font-size:16px;font-weight:800}.body{font-size:13px}.small{font-size:12px}.num{font-size:24px;font-weight:800}.chip{font-size:12px;font-weight:700}
    </style>
    <linearGradient id="mark" x1="0" x2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#7cdbb5"/>
