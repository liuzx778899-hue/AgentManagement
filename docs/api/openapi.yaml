openapi: 3.1.0
info:
  title: AgentManagement Agent Service API
  version: 1.0.0
  description: |
    Agent Service 是 AgentManagement 的后端运行时，负责：
    - 任务队列与任务状态管理
    - Agent 执行会话生命周期
    - 事件投递与审计日志

servers:
  - url: http://localhost:3000/v1
    description: 本地开发服务器

tags:
  - name: Tasks
    description: 任务管理
  - name: Sessions
    description: Runner 会话管理
  - name: Agents
    description: Agent 注册与管理

paths:
  /tasks:
    post:
      tags: [Tasks]
      summary: 创建任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: 任务创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
    get:
      tags: [Tasks]
      summary: 列出任务
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, queued, running, gate, done, failed]
      responses:
        '200':
          description: 任务列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: 获取任务详情
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /tasks/{taskId}/start:
    post:
      tags: [Tasks]
      summary: 启动任务
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务已启动
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /tasks/{taskId}/cancel:
    post:
      tags: [Tasks]
      summary: 取消任务
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务已取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /tasks/{taskId}/logs:
    get:
      tags: [Tasks]
      summary: 获取任务日志
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务日志
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventLog'

  /sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: 获取会话详情
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRun'

  /sessions/{sessionId}/stop:
    post:
      tags: [Sessions]
      summary: 停止会话
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 会话已停止

  /agents:
    get:
      tags: [Agents]
      summary: 列出 Agents
      responses:
        '200':
          description: Agent 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: object

  /health:
    get:
      summary: 健康检查
      responses:
        '200':
          description: 服务健康
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

components:
  schemas:
    Task:
      type: object
      required: [id, projectId, goal, status]
      properties:
        id:
          type: string
        projectId:
          type: string
        goal:
          type: string
        acceptanceCriteria:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, queued, running, gate, done, failed]
        activeRunId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object
      required: [projectId, goal]
      properties:
        projectId:
          type: string
        goal:
          type: string
        acceptanceCriteria:
          type: array
          items:
            type: string

    TaskResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          $ref: '#/components/schemas/Task'

    TaskListResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer

    AgentRun:
      type: object
      required: [id, taskId, status]
      properties:
        id:
          type: string
        taskId:
          type: string
        roleId:
          type: string
        modelProviderId:
          type: string
        modelName:
          type: string
        currentStepId:
          type: string
        status:
          type: string
          enum: [starting, running, waiting_gate, done, failed]
        log:
          type: array
          items:
            type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true

    EventLog:
      type: object
      required: [id, taskId, type, timestamp]
      properties:
        id:
          type: string
        taskId:
          type: string
        runId:
          type: string
        type:
          type: string
          enum:
            - task_created
            - task_started
            - task_completed
            - task_failed
            - task_cancelled
            - run_started
            - run_completed
            - run_failed
            - gate_requested
            - gate_passed
            - gate_failed
        payload:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time

    TaskLogsResponse:
      type: object
      properties:
        ok:
          type: boolean
        logs:
          type: array
          items:
            $ref: '#/components/schemas/EventLog'

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

security:
  - ApiKeyAuth: []